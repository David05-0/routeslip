<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Slip Registry — Sign In</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-eyebrow">Route Slip Registry</div>
      <h1>Sign in</h1>
      <p class="auth-sub">Track a slip through Evaluator, Focal, Program in Charge, Budget, Accounting, and Cash.</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn full" id="loginBtn">Sign in</button>
      </form>

      <div class="auth-foot">No account yet? <a href="register.html">Register here</a></div>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
